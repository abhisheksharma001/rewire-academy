<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<title>Page Not Found — Rewire Academy</title>
<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    background: var(--obsidian);
  }
  .error-code {
    font-family: var(--serif);
    font-size: clamp(80px, 15vw, 160px);
    font-weight: 500;
    line-height: 1;
    color: var(--accent);
    opacity: 0.3;
    margin-bottom: 20px;
  }
  .error-title {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .error-desc {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 40ch;
    margin-bottom: 36px;
    line-height: 1.7;
  }
  .error-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

<nav class="nav scrolled" style="position:fixed;top:0;left:0;right:0;z-index:100;padding:20px var(--section-pad-x);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);">
  <a href="index.html" class="logo"><span>REWIRE</span><span class="logo-cursor"></span></a>
</nav>

<main class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">This page took a different path.</h1>
  <p class="error-desc">
    Like an untrained model, this page doesn't know where it is. 
    Let's get you back to building real AI.
  </p>
  <div class="error-actions">
    <a href="index.html" class="btn btn-primary">← Back to Home</a>
    <a href="mailto:hello@rewire.academy?subject=Help%20finding%20a%20page" class="btn btn-whatsapp">Email Support</a>
  </div>
</main>

</body>
</html>
