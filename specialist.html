<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewire Academy — Specialist Specialization</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      background: #0a0a0a;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      max-width: 600px;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(32px, 5vw, 48px);
      margin-bottom: 16px;
      color: #fff;
    }
    p {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="section-label" style="margin-bottom: 16px;">Specialist Program</div>
    <h1>AI Engineering Specialist</h1>
    <p>Our comprehensive 6-month track designed for senior engineers. Includes advanced multi-agent orchestrations, enterprise security integrations, custom projects, and active career placement support.</p>
    <a href="register.html?course=6-Month%20AI%20Engineering%20Specialist" class="btn btn-primary">Apply for Specialist Program</a>
  </div>
</body>
</html>
